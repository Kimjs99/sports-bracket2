name: Supabase Keep-Alive

# 무료 티어 Supabase는 약 1주 미사용 시 자동 일시정지되어
# 앱이 조용히 빈 화면으로 퇴화한다 (localStorage 폴백 때문에 에러도 안 뜸).
# 주 2회 실제 쿼리를 날려 활동 상태를 유지한다.
on:
  schedule:
    - cron: '0 0 * * 1,4' # 매주 월·목 09:00 KST
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/organizations?select=id&limit=1" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}")
          echo "HTTP $code"
          if [ "$code" != "200" ]; then
            echo "::error::Supabase ping failed (HTTP $code) — 프로젝트가 일시정지되었을 수 있습니다. 대시보드에서 복원하세요: https://supabase.com/dashboard/project/tzdpfjypawavuclyxjeb"
            exit 1
          fi
